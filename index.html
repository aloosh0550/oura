<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>علي OS — لوحة بسيطة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:#0d0d12; --card:#13131a; --card2:#1a1a26;
  --border:#1e1e2e; --text:#e5e7eb; --muted:#6b7280;
  --ac:#a78bfa; --green:#34d399; --yellow:#fbbf24; --red:#f87171;
}

body.light-mode {
  --bg:#f8f9fa; --card:#ffffff; --card2:#f1f3f5;
  --border:#e9ecef; --text:#1a1a2e; --muted:#6b7280;
}

body{
  font-family:'Cairo',sans-serif;
  background:var(--bg);
  color:var(--text);
  direction:rtl;
  min-height:100vh;
  transition:background .3s,color .3s;
  padding:0;
  margin:0;
}

/* HEADER */
#header{
  background:var(--card);
  border-bottom:1px solid var(--border);
  padding:16px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:100;
  transition:background .3s,border-color .3s;
}

.logo{
  font-size:24px;
  font-weight:900;
  color:var(--text);
}

.logo em{
  color:var(--ac);
  font-style:normal;
}

.header-controls{
  display:flex;
  gap:12px;
  align-items:center;
}

.btn-icon{
  width:40px;
  height:40px;
  border:1px solid var(--border);
  background:var(--card2);
  border-radius:8px;
  cursor:pointer;
  font-size:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all .2s;
  color:var(--text);
}

.btn-icon:hover{
  border-color:var(--ac);
  color:var(--ac);
}

/* MAIN CONTAINER */
#container{
  padding:24px;
  max-width:1400px;
  margin:0 auto;
}

.page-title{
  font-size:32px;
  font-weight:900;
  margin-bottom:8px;
  color:var(--text);
}

.page-desc{
  font-size:14px;
  color:var(--muted);
  margin-bottom:24px;
}

/* WIDGETS GRID */
.widgets-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));
  gap:18px;
  margin-bottom:24px;
}

/* WIDGET */
.widget{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:20px;
  position:relative;
  transition:all .2s;
  animation:slideIn .3s ease;
}

.widget:hover{
  border-color:var(--ac);
  transform:translateY(-2px);
}

.widget-header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:12px;
}

.widget-title{
  font-size:16px;
  font-weight:700;
  color:var(--text);
}

.widget-remove{
  background:var(--red);
  color:#fff;
  border:none;
  border-radius:6px;
  width:28px;
  height:28px;
  cursor:pointer;
  font-size:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all .2s;
  opacity:0;
}

.widget:hover .widget-remove{
  opacity:1;
}

.widget-remove:hover{
  background:#dc2626;
  transform:scale(1.1);
}

.widget-content{
  font-size:14px;
  color:var(--muted);
  line-height:1.6;
}

.widget-icon{
  font-size:32px;
  margin-bottom:8px;
}

/* BIG NUMBERS */
.widget-number{
  font-size:36px;
  font-weight:900;
  color:var(--ac);
  margin:8px 0;
}

.widget-label{
  font-size:12px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:0.5px;
  font-weight:700;
}

/* ADD WIDGET BUTTON */
.add-widget-section{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:24px;
}

.widget-template{
  background:var(--card2);
  border:2px dashed var(--border);
  border-radius:12px;
  padding:16px 20px;
  cursor:pointer;
  transition:all .2s;
  font-size:14px;
  color:var(--muted);
  font-weight:700;
  display:flex;
  align-items:center;
  gap:8px;
}

.widget-template:hover{
  border-color:var(--ac);
  color:var(--ac);
  background:var(--card);
}

/* MODAL */
#modal{
  display:none;
  position:fixed;
  inset:0;
  background:#00000088;
  z-index:500;
  align-items:center;
  justify-content:center;
  backdrop-filter:blur(3px);
}

#modal.open{
  display:flex;
}

.modal-content{
  background:var(--card);
  border-radius:16px;
  padding:28px;
  max-width:500px;
  width:90%;
  border:1px solid var(--border);
  animation:slideUp .3s ease;
}

.modal-title{
  font-size:20px;
  font-weight:800;
  color:var(--text);
  margin-bottom:20px;
}

.form-group{
  margin-bottom:16px;
}

.form-label{
  display:block;
  font-size:13px;
  font-weight:700;
  color:var(--muted);
  margin-bottom:6px;
  text-transform:uppercase;
  letter-spacing:0.5px;
}

.form-input{
  width:100%;
  background:var(--card2);
  border:1px solid var(--border);
  border-radius:8px;
  padding:10px 14px;
  color:var(--text);
  font-family:'Cairo',sans-serif;
  font-size:13px;
  transition:all .2s;
}

.form-input:focus{
  border-color:var(--ac);
  outline:none;
}

.form-textarea{
  resize:vertical;
  min-height:80px;
}

.form-buttons{
  display:flex;
  gap:12px;
  margin-top:24px;
  justify-content:flex-end;
}

.btn{
  border:none;
  border-radius:8px;
  padding:10px 20px;
  cursor:pointer;
  font-family:'Cairo',sans-serif;
  font-weight:700;
  font-size:14px;
  transition:all .2s;
}

.btn-primary{
  background:var(--ac);
  color:#fff;
}

.btn-primary:hover{
  opacity:.85;
  transform:translateY(-2px);
}

.btn-secondary{
  background:var(--card2);
  color:var(--muted);
  border:1px solid var(--border);
}

.btn-secondary:hover{
  border-color:var(--ac);
  color:var(--text);
}

/* ANIMATIONS */
@keyframes slideIn{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

@keyframes slideUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

/* RESPONSIVE */
@media(max-width:768px){
  .widgets-grid{
    grid-template-columns:1fr;
  }
  
  #header{
    padding:12px 16px;
  }
  
  #container{
    padding:16px;
  }
  
  .page-title{
    font-size:24px;
  }
}
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div class="logo">عـلي<em>OS</em></div>
  <div class="header-controls">
    <button class="btn-icon" id="theme-btn" onclick="toggleTheme()" title="تبديل الوضع">🌙</button>
    <button class="btn-icon" onclick="openModal()" title="إضافة ويدجت">➕</button>
  </div>
</div>

<!-- MAIN CONTAINER -->
<div id="container">
  <div class="page-title">لوحتي البسيطة</div>
  <div class="page-desc">أضف أو احذف الويدجتات حسب احتياجاتك</div>

  <!-- ADD WIDGET TEMPLATES -->
  <div class="add-widget-section" id="templates"></div>

  <!-- WIDGETS GRID -->
  <div class="widgets-grid" id="widgets-grid"></div>
</div>

<!-- MODAL -->
<div id="modal" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-title">إضافة ويدجت جديد</div>
    <form onsubmit="addWidget(event)">
      <div class="form-group">
        <label class="form-label">النوع</label>
        <select class="form-input" id="type-select" onchange="updatePreview()">
          <option value="text">نص بسيط</option>
          <option value="number">رقم</option>
          <option value="checklist">قائمة مهام</option>
          <option value="notes">ملاحظات</option>
        </select>
      </div>
      
      <div class="form-group">
        <label class="form-label">العنوان</label>
        <input class="form-input" type="text" id="title-input" placeholder="عنوان الويدجت" required>
      </div>

      <div class="form-group">
        <label class="form-label">المحتوى</label>
        <textarea class="form-input form-textarea" id="content-input" placeholder="محتوى الويدجت"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">الأيقونة</label>
        <input class="form-input" type="text" id="icon-input" placeholder="😊" value="📋" maxlength="2">
      </div>

      <div class="form-buttons">
        <button type="button" class="btn btn-secondary" onclick="closeModal()">إلغاء</button>
        <button type="submit" class="btn btn-primary">إضافة ويدجت</button>
      </div>
    </form>
  </div>
</div>

<script>
const SK = "ali_os_widgets_v1";
const TEMPLATES = [
  {type:"text", icon:"📝", title:"ملاحظة سريعة", content:""},
  {type:"number", icon:"📊", title:"رقم مهم", content:""},
  {type:"checklist", icon:"✅", title:"قائمة مهام", content:""},
  {type:"notes", icon:"💡", title:"فكرة", content:""},
];

let widgets = [];

// Load data
function loadData(){
  try{
    const data = localStorage.getItem(SK);
    if(data) widgets = JSON.parse(data);
  }catch(e){
    widgets = [];
  }
  render();
}

// Save data
function saveData(){
  try{
    localStorage.setItem(SK, JSON.stringify(widgets));
  }catch(e){}
}

// Render
function render(){
  renderTemplates();
  renderWidgets();
}

// Render templates
function renderTemplates(){
  const html = TEMPLATES.map(t => `
    <div class="widget-template" onclick="addQuickWidget('${t.type}', '${t.icon}', '${t.title}')">
      ${t.icon} ${t.title}
    </div>
  `).join('');
  document.getElementById('templates').innerHTML = html;
}

// Add quick widget
function addQuickWidget(type, icon, title){
  const widget = {
    id: Date.now(),
    type,
    icon,
    title,
    content: '',
    items: []
  };
  widgets.push(widget);
  saveData();
  render();
}

// Open modal
function openModal(){
  document.getElementById('modal').classList.add('open');
  document.getElementById('type-select').value = 'text';
  document.getElementById('title-input').value = '';
  document.getElementById('content-input').value = '';
  document.getElementById('icon-input').value = '📋';
}

// Close modal
function closeModal(e){
  if(e && e.target.id !== 'modal') return;
  document.getElementById('modal').classList.remove('open');
}

// Add widget from form
function addWidget(e){
  e.preventDefault();
  
  const type = document.getElementById('type-select').value;
  const title = document.getElementById('title-input').value;
  const content = document.getElementById('content-input').value;
  const icon = document.getElementById('icon-input').value || '📋';

  if(!title.trim()) return;

  const widget = {
    id: Date.now(),
    type,
    icon,
    title,
    content,
    items: type === 'checklist' ? content.split('\n').filter(x=>x.trim()).map(x=>({text:x,done:false})) : []
  };

  widgets.push(widget);
  saveData();
  render();
  closeModal();
}

// Remove widget
function removeWidget(id){
  widgets = widgets.filter(w => w.id !== id);
  saveData();
  render();
}

// Toggle item
function toggleItem(widgetId, itemIndex){
  const widget = widgets.find(w => w.id === widgetId);
  if(widget && widget.items[itemIndex]){
    widget.items[itemIndex].done = !widget.items[itemIndex].done;
    saveData();
    render();
  }
}

// Render widgets
function renderWidgets(){
  const html = widgets.map(w => {
    let content = '';
    
    if(w.type === 'text'){
      content = `<div class="widget-content">${w.content || 'لا يوجد محتوى'}</div>`;
    }
    else if(w.type === 'number'){
      content = `<div class="widget-number">${w.content || '0'}</div>`;
    }
    else if(w.type === 'checklist'){
      const items = w.items.map((item, i) => `
        <div style="display:flex;gap:8px;margin-bottom:6px;cursor:pointer;" onclick="toggleItem(${w.id}, ${i})">
          <input type="checkbox" ${item.done ? 'checked' : ''} style="cursor:pointer;">
          <span style="text-decoration:${item.done ? 'line-through' : 'none'};opacity:${item.done ? 0.5 : 1};">${item.text}</span>
        </div>
      `).join('');
      content = `<div style="font-size:13px;">${items || '<div class="widget-content">لا توجد مهام</div>'}</div>`;
    }
    else if(w.type === 'notes'){
      content = `<div class="widget-content" style="white-space:pre-wrap;">${w.content || 'لا توجد ملاحظات'}</div>`;
    }

    return `
      <div class="widget">
        <div class="widget-header">
          <div>
            <div style="font-size:24px;margin-bottom:6px;">${w.icon}</div>
            <div class="widget-title">${w.title}</div>
          </div>
          <button class="widget-remove" onclick="removeWidget(${w.id})">✕</button>
        </div>
        ${content}
      </div>
    `;
  }).join('');

  document.getElementById('widgets-grid').innerHTML = html || '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted);">لا توجد ويدجتات. أضف واحدة الآن!</div>';
}

// Theme toggle
function toggleTheme(){
  const body = document.body;
  body.classList.toggle('light-mode');
  const isLight = body.classList.contains('light-mode');
  localStorage.setItem('lightMode', isLight);
  document.getElementById('theme-btn').textContent = isLight ? '☀️' : '🌙';
}

// Load theme
if(localStorage.getItem('lightMode') === 'true'){
  document.body.classList.add('light-mode');
  document.getElementById('theme-btn').textContent = '☀️';
}

// Init
loadData();
</script>
</body>
</html>
